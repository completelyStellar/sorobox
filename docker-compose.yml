services:
  sorobox_postgres:
    image: postgres:latest
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${DB_DATABASE}
      POSTGRES_USER: ${DB_USERNAME}
      POSTGRES_PASSWORD: ${DB_PASSWORD}
    ports:
      - "${DB_PORT}:5432"
    volumes:
      - sorobox_postgres_data:/var/lib/postgresql/data
    networks:
      - sorobox-net

  api:
    build:
      context: .
      dockerfile: Dockerfile
    ports:
      - "8080:8080"
    environment:
      PORT: "8080"
      APP_ENV: docker
      DB_HOST: sorobox_postgres
      DB_PORT: "5432"
      DB_DATABASE: ${DB_DATABASE}
      DB_USERNAME: ${DB_USERNAME}
      DB_PASSWORD: ${DB_PASSWORD}
      DB_SCHEMA: ${DB_SCHEMA}
    depends_on:
      sorobox_postgres:
        condition: service_started
    networks:
      - sorobox-net

networks:
  sorobox-net:
    driver: bridge

volumes:
  sorobox_postgres_data:
