name: Trivy Scan

on:
  pull_request:
  push:
    branches:
      - main
      - master
      - deploy

env:
  IMAGE_NAME: sorobox

jobs:
  docker_build_trivy_scan:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Build Docker Image
        run: docker build -t ${{ env.IMAGE_NAME }}:ci .

      - name: Run Trivy scan
        uses: aquasecurity/trivy-action@master
        with:
          image-ref: ${{ env.IMAGE_NAME }}:ci
          severity: HIGH,CRITICAL
          exit-code: 1
          ignore-unfixed: true
