version: "2"
sql:
  - engine: "postgresql"
    schema: "./migrations/"
    queries: "./internal/repository/query/"
    gen:
      go:
        package: "repository"
        out: "./internal/repository/db"
        sql_package: "pgx/v5"
        emit_interface: true
        emit_json_tags: true
        emit_prepared_queries: false
        overrides:
          - db_type: "uuid"
            go_type:
              import: "github.com/google/uuid"
              type: "UUID"
          - db_type: "timestamptz"
            go_type: "time.Time"
          - db_type: "numeric"
            go_type:
              import: "github.com/shopspring/decimal"
              type: "Decimal"
